<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
  <title>PDF Viewer</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    body {
      margin: 0;
      background: #f4f6f8;
      color: #1c1c1c;
    }
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: #ffffff;
      border-bottom: 1px solid #d8dde3;
      flex-wrap: wrap;
      display: none;
    }
    .toolbar button {
      border: 1px solid #c7d0da;
      border-radius: 6px;
      background: #ffffff;
      padding: 7px 10px;
      font-size: 14px;
      cursor: pointer;
    }
    .toolbar button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .meta {
      font-size: 13px;
      color: #4e5966;
      margin-left: auto;
    }
    #status {
      padding: 8px 12px;
      font-size: 13px;
      color: #4e5966;
      background: #fff;
      border-bottom: 1px solid #d8dde3;
    }
    #canvasWrap {
      padding: 12px;
      display: flex;
      justify-content: center;
    }
    canvas {
      width: 100%;
      max-width: 1200px;
      height: auto;
      background: #fff;
      box-shadow: 0 1px 8px rgba(0, 0, 0, 0.14);
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button id="prevBtn">Prev</button>
    <button id="nextBtn">Next</button>
    <button id="zoomOutBtn">-</button>
    <button id="zoomInBtn">+</button>
    <span id="meta" class="meta">Page 0/0</span>
  </div>
  <div id="status">Inicializando viewer...</div>
  <div id="canvasWrap">
    <canvas id="pdfCanvas"></canvas>
  </div>

  <script src="./pdf.min.js"></script>
  <script src="./viewer.js"></script>
</body>
</html>
