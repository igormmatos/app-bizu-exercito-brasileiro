<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sem internet | Bizus EB</title>
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f3f4f6;
        color: #111827;
        padding: 24px;
      }
      main {
        width: min(560px, 100%);
        background: #ffffff;
        border: 1px solid #d1d5db;
        border-radius: 12px;
        padding: 20px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 20px;
      }
      p {
        margin: 0;
        font-size: 15px;
        line-height: 1.5;
        color: #374151;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Sem internet</h1>
      <p>Sem internet. Abra um conteúdo já acessado ou volte quando a conexão retornar.</p>
    </main>
  </body>
</html>
